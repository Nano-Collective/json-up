name: Tests for PRs

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx biome check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome lint .

      - name: Test
        run: npx ava

      - name: Check unused exports
        run: npx knip
